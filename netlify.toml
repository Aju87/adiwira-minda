[build]
  command = "npm run build"
  publish = "dist"

# Landing page — mesti datang SEBELUM /* catch-all
[[redirects]]
  from = "/landing"
  to   = "/landing.html"
  status = 200

# Admin route → React app handle
[[redirects]]
  from = "/admin"
  to   = "/index.html"
  status = 200

# SPA catch-all
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
